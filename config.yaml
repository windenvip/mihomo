# 规则体系优先级完全保留最优
rules:
  # 本地内网直连
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve

  # 自定义私有域名
  - DOMAIN,office.app.5ddd.com,DIRECT
  - DOMAIN-KEYWORD,app.5ddd.com,DIRECT
  - PROCESS-NAME,subs-check.exe,🌏 国内直连
  - PROCESS-NAME,subs-check,🌏 国内直连

  # 局域网白名单
  - RULE-SET,LocalAreaNetwork,🌏 国内直连
  - RULE-SET,UnBan,🌏 国内直连

  # 广告优先拦截
  - RULE-SET,BanAD,🛑 广告净化
  - RULE-SET,BanProgramAD,🛑 广告净化

  # 核心服务规则
  - RULE-SET,GoogleFCM,📢 谷歌FCM
  - RULE-SET,GoogleCN,🌏 国内直连
  - RULE-SET,SteamCN,🌏 国内直连
  - RULE-SET,Telegram,📲 电报消息
  - RULE-SET,AI,💬 AI全能
  - RULE-SET,YouTube,🎬 海外影视
  - RULE-SET,Netflix,🎬 海外影视
  - RULE-SET,Bilibili,📺 哔哩哔哩
  - RULE-SET,ChinaMedia,🌏 国内直连
  - RULE-SET,ProxyMedia,🌍 海外通用

  - RULE-SET,ProxyGFWlist,🌍 海外通用

  # 国内域名IP全部直连
  - RULE-SET,ChinaDomain,🌏 国内直连
  - RULE-SET,ChinaCompanyIp,🌏 国内直连
  - RULE-SET,Download,🌏 国内直连
  - GEOIP,CN,🌏 国内直连

  # 兜底所有未知流量
  - MATCH,🐟 漏网之鱼
