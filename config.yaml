# 基础配置
mixed-port: 7890
socks-port: 7891
port: 7892
redir-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
external-controller: '0.0.0.0:9090'
secret: ''

# 网络增强 适配NAS容器桥接网络
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# 订阅节点（后续新增订阅仅添加此处，代理分组完全无需修改）
proxy-providers:
  shaoyouvip:
    type: http
    url: "https://raw.githubusercontent.com/shaoyouvip/free/refs/heads/main/mihomo.yaml"
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
  kooker:
    type: http
    url: "https://raw.githubusercontent.com/kooker/FreeSubsCheck/refs/heads/main/all.yaml"
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
  nodesfree:
    type: http
    url: "https://raw.githubusercontent.com/nodesfree/clashnode/refs/heads/main/clash.yaml"
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
  ovmvo:
    type: http
    url: "https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml"
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

# 地理数据源
profile:
  store-selected: true
  store-fake-ip: true
geo-auto-update: true
geo-update-interval: 24
geodata-mode: false
geox-url:
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*"
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
  use-hosts: false
  use-system-hosts: false
  respect-rules: false
  default-nameserver:
    - tls://223.5.5.5
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver: []
  fallback: []
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com

# ===================== 核心优化：代理分组 =====================
# 【结构调整】♻️ 智能自动 放到所有国家地区分组**最前面**
# 【排序规则】全部国家严格：**离中国由近到远 地理距离排序**
# 全部 include-all 全局全订阅包含 | 同地区负载均衡轮询 | 全APP默认智能自动
proxy-groups:
  # 【置顶】主自动故障转移组（所有分组第一位）
  # 优先级链路完全跟随下方国家【由近到远】排序
  - name: ♻️ 智能自动
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 60
    proxies:
      - 🇭🇰 香港
      - 🇨🇳 台湾
      - 🇰🇷 韩国
      - 🇯🇵 日本
      - 🇸🇬 新加坡
      - 🇺🇲 美国
      - 🇷🇺 俄罗斯
      - 🇳🇱 荷兰
      - 🇩🇪 德国
      - 🇫🇮 芬兰
      - 🇸🇪 瑞典
      - 🇩🇰 丹麦
      - 🇳🇴 挪威
      - 🇨🇭 瑞士
      - 🇦🇹 奥地利
      - 🇫🇷 法国
      - 🇬🇧 英国
      - 🇮🇹 意大利
      - 🇪🇸 西班牙
      - 🇵🇹 葡萄牙
      - 🌐 其他节点
      - DIRECT

  # ============== 以下所有国家地区分组 严格【离中国由近到远】排序 ==============
