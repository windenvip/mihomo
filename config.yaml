# 基础配置
mixed-port: 7890
socks-port: 7891
port: 7892
redir-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
external-controller: '0.0.0.0:9090'
secret: ''

# 全局统一延迟、TCP并发优化
unified-delay: true
tcp-concurrent: true
keep-alive-interval: 30

# ========== 新增：全局自动隐藏不可用节点 核心总开关 ==========
# 所有select下拉组自动隐藏无可用节点的空分组
disable-empty-select: true
# include-all继承节点时，自动过滤全部失效死节点
filter-empty-proxies: true

# TUN 模式新版标准优化配置
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: false
  strict-route: true
  exclude-interface:
    - lo

# 代理订阅源 GitHub CDN加速 稳定拉取
proxy-providers:
  shaoyouvip:
    type: http
    url: "https://cdn.jsdelivr.net/gh/shaoyouvip/free@main/mihomo.yaml"
    interval: 21600
    path: ./proxy/shaoyouvip.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
  kooker:
    type: http
    url: "https://cdn.jsdelivr.net/gh/kooker/FreeSubsCheck@main/all.yaml"
    interval: 21600
    path: ./proxy/kooker.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
  nodesfree:
    type: http
    url: "https://cdn.jsdelivr.net/gh/nodesfree/clashnode@main/clash.yaml"
    interval: 21600
    path: ./proxy/nodesfree.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
  ovmvo:
    type: http
    url: "https://cdn.jsdelivr.net/gh/ovmvo/FreeSub@main/sub/permanent/mihomo.yaml"
    interval: 21600
    path: ./proxy/ovmvo.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

profile:
  store-selected: true
  store-fake-ip: true
geo-auto-update: true
geo-update-interval: 24
geodata-mode: true
geox-url:
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

# DNS全套深度优化
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - www.gstatic.com
    - speed.hetzner.de
    - +.mihomo.party
  use-hosts: false
  use-system-hosts: false
  respect-rules: true
  default-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
      - +.twitter.com
      - +.openai.com

# ==============================================
# 【精简版代理分组】全部新增 hide-unavailable: true 自动隐藏不可用节点
# 国家地区组、智能组、业务组全部生效，无可用节点自动隐藏整组
# ==============================================
proxy-groups:
  # 全局智能优选（自动最快节点）
  - name: ♻️ 智能自动
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 90
    tolerance: 50
    max-delay: 450
    lazy: false
    timeout: 2000
    strategy: fastest
    hide-unavailable: true
    proxies:
      - 🇭🇰 中国香港
      - 🇨🇳 中国台湾
      - 🇰🇷 韩国
      - 🇯🇵 日本
      - 🇸🇬 新加坡
      - 🇻🇳 越南
      - 🇮🇩 印尼
      - 🇲🇾 马来西亚
      - 🇺🇲 美国
      - 🇷🇺 俄罗斯
      - 🇳🇱 荷兰
      - 🇩🇪 德国
      - 🌐 其他节点
      - DIRECT

  # ========== 完整国家地区分组（全部保留原正则+测速+新增隐藏死节点） ==========
  - name: 🇭🇰 中国香港
    type: url-test
    include-all: true
    filter: (?i)港|HK|hk|Hong Kong|HongKong
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 500
    strategy: fastest
    hide-unavailable: true

  - name: 🇨🇳 中国台湾
    type: url-test
    include-all: true
    filter: (?i)台|TW|tw|Taiwan|taiwan|新北|彰化|臺灣
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 500
    strategy: fastest
    hide-unavailable: true

  - name: 🇰🇷 韩国
    type: url-test
    include-all: true
    filter: (?i)韩|首尔|KR|kr|Korea|KOR|釜山
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 500
    strategy: fastest
    hide-unavailable: true

  - name: 🇯🇵 日本
    type: url-test
    include-all: true
    filter: (?i)日本|JP|jp|Japan|东京|大阪|埼玉|名古屋
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 500
    strategy: fastest
    hide-unavailable: true

  - name: 🇸🇬 新加坡
    type: url-test
    include-all: true
    filter: (?i)新加坡|SG|sg|Singapore|狮城
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 500
    strategy: fastest
    hide-unavailable: true

  - name: 🇻🇳 越南
    type: url-test
    include-all: true
    filter: (?i)越南|VN|vn|Vietnam|海阳
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 450
    strategy: fastest
    hide-unavailable: true

  - name: 🇮🇩 印尼
    type: url-test
    include-all: true
    filter: (?i)印尼|ID|id|Indonesia
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 500
    strategy: fastest
    hide-unavailable: true

  - name: 🇲🇾 马来西亚
    type: url-test
    include-all: true
    filter: (?i)马来西亚|MY|my|Malaysia
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 500
    strategy: fastest
    hide-unavailable: true

  - name: 🇺🇲 美国
    type: url-test
    include-all: true
    filter: (?i)美|US|us|United States|洛杉矶|纽约
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 600
    strategy: fastest
    hide-unavailable: true

  - name: 🇷🇺 俄罗斯
    type: url-test
    include-all: true
    filter: (?i)俄|RU|ru|Russia|莫斯科
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 650
    strategy: fastest
    hide-unavailable: true

  - name: 🇳🇱 荷兰
    type: url-test
    include-all: true
    filter: (?i)荷|NL|nl|Netherlands
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 650
    strategy: fastest
    hide-unavailable: true

  - name: 🇩🇪 德国
    type: url-test
    include-all: true
    filter: (?i)德|DE|de|Germany
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 650
    strategy: fastest
    hide-unavailable: true

  - name: 🌐 其他节点
    type: url-test
    include-all: true
    exclude-filter: (?i)港|HK|台湾|TW|韩国|KR|日本|JP|新加坡|SG|越南|VN|印尼|ID|马来西亚|MY|美国|US|俄罗斯|RU|荷兰|NL|德国|DE
    url: https://www.gstatic.com/generate_204
    interval: 150
    tolerance: 50
    max-delay: 750
    strategy: fastest
    hide-unavailable: true

  # ==============================================
  # 【主切换菜单 极度精简】下拉自动隐藏无可用节点分组
  # 原始：智能自动、港、台、日、新、美、直连
  # 某地区全部节点失效 → 该国家分组直接从下拉消失
  # ==============================================
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 智能自动
      - 🇭🇰 中国香港
      - 🇨🇳 中国台湾
      - 🇯🇵 日本
      - 🇸🇬 新加坡
      - 🇺🇲 美国
      - DIRECT

  # ==============================================
  # 【合并精简业务分组】全部新增隐藏参数，无可用节点自动隐藏整组
  # ==============================================
  - name: 📲 电报消息
    type: url-test
    url: https://cdn.jsdelivr.net/gh/telegramme-io/static/telegram_204.png
    interval: 80
    tolerance: 40
    max-delay: 400
    strategy: fastest
    hide-unavailable: true
    proxies:
      - 🚀 节点选择
      - DIRECT

  - name: 🎬 海外影视
    type: url-test
    url: https://i.ytimg.com/generate_204
    interval: 80
    tolerance: 40
    max-delay: 450
    strategy: fastest
    hide-unavailable: true
    proxies:
      - 🚀 节点选择
      - DIRECT

  - name: 💬 AI全能
    type: url-test
    url: https://api.openai.com/favicon.ico
    interval: 80
    tolerance: 40
    max-delay: 550
    strategy: fastest
    hide-unavailable: true
    proxies:
      - 🚀 节点选择
      - DIRECT

  - name: 🌍 海外通用
    type: url-test
    url: https://www.google.com/generate_204
    interval: 80
    tolerance: 40
    max-delay: 430
    strategy: fastest
    hide-unavailable: true
    proxies:
      - 🚀 节点选择
      - DIRECT

  - name: 📺 哔哩哔哩
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 中国香港
      - 🇨🇳 中国台湾

  - name: 📢 谷歌FCM
    type: url-test
    url: https://firebase.googleapis.com/generate_204
    interval: 80
    tolerance: 40
    max-delay: 400
    strategy: fastest
    hide-unavailable: true
    proxies:
      - 🚀 节点选择
      - DIRECT

  # 国内基础服务
  - name: 🌏 国内直连
    type: select
    proxies:
      - DIRECT
      - ♻️ 智能自动

  # 广告拦截
  - name: 🛑 广告净化
    type: select
    proxies:
      - REJECT
      - DIRECT

  # 兜底未知流量
  - name: 🐟 漏网之鱼
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 100
    tolerance: 50
    max-delay: 500
    strategy: fastest
    hide-unavailable: true
    proxies:
      - 🚀 节点选择
      - DIRECT

